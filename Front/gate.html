<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification - Accès au site</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    .gate-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      width: 100%;
      max-width: 380px;
      padding: 40px 36px;
      text-align: center;
    }

    .gate-icon { font-size: 48px; margin-bottom: 16px; }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Captcha mathématique ── */
    .captcha-box {
      background: #f8f9ff;
      border: 1.5px solid #e0e0f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .captcha-question {
      font-size: 22px;
      font-weight: 700;
      color: #4f46e5;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .captcha-input {
      width: 100px;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 18px;
      text-align: center;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .captcha-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }

    .refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      margin-left: 10px;
      opacity: .6;
      vertical-align: middle;
      transition: opacity .2s, transform .3s;
    }
    .refresh-btn:hover { opacity: 1; transform: rotate(180deg); }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn:hover    { background: #4338ca; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 18px;
    }
    .msg.error   { color: #dc2626; }
    .msg.success { color: #16a34a; }
  </style>
</head>
<body>

  <div class="gate-card">
    <div class="gate-icon">🔒</div>
    <h1>Vérification requise</h1>
    <p class="subtitle">Résolvez le calcul pour accéder au site.</p>

    <div class="captcha-box">
      <div class="captcha-question" id="captcha-question">…</div>
      <input type="number" id="captcha-answer" class="captcha-input"
        placeholder="?" autocomplete="off" min="0" max="999"
      >
      <button class="refresh-btn" id="btn-refresh" title="Nouvelle question" aria-label="Nouvelle question">🔄</button>
    </div>
    <div id="timer-box" style="font-size: 14px; color: #ef4444; margin-top: 10px; font-weight: bold;">
      Temps restant : <span id="timer-count">30</span>s
    </div>

    <button class="btn" id="btn-enter">Accéder au site</button>
    <p class="msg" id="gate-msg"></p>
  </div>

  <script>
    let correctAnswer;
    let timerInterval; // Permettra de stocker l'identifiant du timer
    const TIME_LIMIT = 30; // Temps en secondes pour répondre

    function generateQuestion() {
      // 1. Logique existante de génération
      const n1 = Math.floor(Math.random() * 9) + 1;
      const n2 = Math.floor(Math.random() * 9) + 1;
      correctAnswer = n1 + n2;
      document.getElementById('captcha-question').textContent = `${n1} + ${n2} = ?`;
      
      const msg = document.getElementById('gate-msg');
      msg.textContent = '';
      msg.className   = 'msg';

      // 2. Réinitialisation et lancement du Timer
      clearInterval(timerInterval); // On stoppe le chrono précédent s'il tournait
      startTimer();
    }

    function startTimer() {
      let timeLeft = TIME_LIMIT;
      const timerDisplay = document.getElementById('timer-count');
      const input = document.getElementById('captcha-answer');
      const btnEnter = document.getElementById('btn-enter');
      
      // On réactive les champs au cas où ils étaient bloqués
      input.disabled = false;
      btnEnter.disabled = false;
      timerDisplay.textContent = timeLeft;

      timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timerInterval); // On arrête le chrono
          
          // On bloque temporairement la saisie
          input.disabled = true;
          btnEnter.disabled = true;
          
          const msg = document.getElementById('gate-msg');
          msg.className = 'msg error';
          msg.textContent = 'Temps écoulé ! Génération d\'un nouveau calcul...';

          // On attend 2 secondes pour que l'utilisateur comprenne, puis on régénère
          setTimeout(() => {
            generateQuestion();
          }, 2000);
        }
      }, 1000);
    }

    // Validation du formulaire
    function validate() {
      const input = document.getElementById('captcha-answer');
      const msg   = document.getElementById('gate-msg');
      const given = parseInt(input.value, 10);

      if (input.value === '' || isNaN(given)) {
        msg.className   = 'msg error';
        msg.textContent = 'Entrez un nombre.';
        return;
      }

      if (given === correctAnswer) {
        clearInterval(timerInterval); // IMPORTANT : On arrête le timer si c'est correct !
        msg.className   = 'msg success';
        msg.textContent = '✓ Correct !';
        document.getElementById('btn-enter').disabled = true;

        setTimeout(() => {
          sessionStorage.setItem('gate_passed', '1');
          window.location.href = 'index.html';
        }, 500);
      } else {
        msg.className   = 'msg error';
        msg.textContent = 'Mauvaise réponse. Réessayez.';
        input.value = '';
        input.focus();
        generateQuestion(); // Relance une question ET reset le timer automatiquement
      }
    }

    // Écouteurs d'événements (Inchangés)
    document.getElementById('btn-refresh').addEventListener('click', generateQuestion);
    document.getElementById('btn-enter').addEventListener('click', validate);
    document.getElementById('captcha-answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') validate();
    });

    // Initialisation au chargement
    generateQuestion();
  </script>
</body>
</html>
